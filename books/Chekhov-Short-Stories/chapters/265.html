    <h2 id="cha258_258_1">报告</h2>
<p>谨呈</p>
<p>第二区警察所长大人</p>
<h3 id="cha258_258_1_1">报告</h3>
<p>谨向大人报告，在老山谷附近的米哈尔科夫森林中，我在过桥时看见一具自缢的尸体，已完全气绝。根据证件查知该人名叫斯切潘·马克西莫沃·卡察果夫，退伍士兵，五十一岁。从其布口袋和破衣服看来，该人显然是一乞丐。身上除一根绳子并无任何伤痕，所有衣物均在身边。我没发现其自杀原因，但不外乎酗酒所致。查布罗夫斯基村民曾见他走出酒馆。此案是否上报，或恭候大人亲来处理？</p>
<p><span>乡村警察</span>　<b>杰尼斯<span>·</span>奇</b></p>
<p><b>报导者无脾人</b></p>
