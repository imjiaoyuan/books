    <h1 id="sigil_toc_id_46"><span>贫血集</span></h1>
<h2 id="sigil_toc_id_47"><span>小序</span></h2>
<p><span>　　三年来，因营养不良，与打摆子，得了贫血病。病重的时候，多日不能起床；一动，就晕得上吐下泻。病稍好，也还不敢多作事，怕又忽然晕倒。</span></p>
<p><span>　　以贫血名集，有向读者致敬之意；其人贫血，其作品亦难健旺也。</span></p>
<p><span>　　老舍于北碚。</span></p>
