    <h2 id="cha238_238_1">命令</h2>
<p>采自偏僻地区的生活</p>
<p>鉴于盛大的基督圣诞节即将来临，而每逢节日则有大批贺客来到接待室，本人要求您，尊敬的先生，恪守职责，严密监督，务使在接待室等候的贺客不要拥挤，不要吸烟，不要喧哗，否则可能影响正常秩序。除此以外，贺客不得在楼梯上，在接待室中乱撒谷粒、豌豆、面粉等粮食。本人还要求您恪守职责，以尽可能谦和有礼的态度启发贺客，务使他们所带之活物形同死去，以免这些人因猪鹅等畜禽之叫声而破坏应有之宁静。凡有违犯者，按惯例从严究办。</p>
<p>六品文官兼勋章获得者：</p>
<p><b>玛·巴乌科夫</b>。</p>
<p><span>秘书</span>：<b>叶希多夫</b>。</p>
<p>经查，此系原件。</p>
<p>无脾人<a href="part0325.html#jz_34_34c" id="jzyy_34_34c"><sup>(34)</sup></a>。</p>
