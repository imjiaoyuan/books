    <h2 id="cha283_283_1">上当</h2>
<p>非常古老的笑话</p>
<p>英国有段时期，被判处死刑的罪犯有权在生前把自己的尸体预卖给解剖学家或生理学家。卖到的钱他们或是给自己的家人，或是换酒喝。有一个罪行极其严重的死刑犯找到一位著名的医生，一再讨价还价之后，以两个金币的价钱把自己的遗体卖给了医生。可是拿到钱之后，他突然哈哈大笑起来……</p>
<p>“您笑什么？？”医生不解地问。</p>
<p>“您要买的是我被绞死的遗体，”死刑犯大笑道，“可是您上当了！我将被烧死<a href="part0325.html#jz_199_199c" id="jzyy_199_199c"><sup>(199)</sup></a>！哈——哈——哈！”</p>
