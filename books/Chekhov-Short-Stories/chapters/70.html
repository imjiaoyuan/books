    <h2 id="cha64_64_1">报刊读者的想法</h2>
<p>别读<b>乌法省新闻</b><a href="part0196.html#jz_1_14b" id="jzyy_1_14b"><sup>(14)</sup></a>：从中您得不到任何有关乌法省的新闻。</p>
<p>俄国报刊拥有许多光源。如，它有科马罗夫的<b>光明</b><a href="part0196.html#jz_1_15b" id="jzyy_1_15b"><sup>(15)</sup></a>、霞光、彩虹、光与影、光线、星火、黎明，等等，可为什么它还如此黑暗？</p>
<p>原来它有<b>监视人</b>、<b>残废人</b>与<b>西伯利亚</b><a href="part0196.html#jz_1_16b" id="jzyy_1_16b"><sup>(16)</sup></a>。</p>
<p>报刊还有<b>娱乐</b>和<b>小玩具</b>，然而却不能由此得出结论：它太快活了……</p>
<p>它有自己的<b>呼声</b>和<b>回声</b>……是吗？</p>
<p>凡寿命不长者，不能夸耀自己的<b>世纪</b><a href="part0196.html#jz_1_17b" id="jzyy_1_17b"><sup>(17)</sup></a>。</p>
<p><b>罗斯</b><a href="part0196.html#jz_1_18b" id="jzyy_1_18b"><sup>(18)</sup></a>与<b>莫斯科</b>很少有相同之处。</p>
<p><b>俄国思想</b>包在厚实的封皮里寄出。</p>
<p>既有<b>健康</b>，又有<b>医师</b>，可是——坟墓真多呀！</p>
