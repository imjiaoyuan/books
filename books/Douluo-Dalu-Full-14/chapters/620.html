    <p id="filepos10231628"><span><span>第二集第一魂环月末，唐门召集令</span></span></p><p>底了，大家至少都有第二，甚至是第三张月票了斗罗最后一个月全月求月票，下个月即将结束，同时开启新书。唐门的兄弟姐妹们，小三请求你们，用我们唐门全部的力量将斗罗最后推上巅峰吧。只要重回第一宝座，小三第二天立刻多更一章，爆发一万七酬谢大家。同时，还有我们的推荐票。</p><p>最后的时刻即将来临，小三一定努力写好斗罗，给斗罗一个完美的结局，推荐票也麻烦大家百忙之中点一下，投给小三，谢谢。(未完待续，如欲知后事如何，请登陆qidian.com，章节更多，支持作者，支持正版阅读！)</p><div id="calibre_pb_619"></div>
