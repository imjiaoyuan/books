    <h2 id="cha270_270_1">威胁</h2>
<p>一位老爷的马被人偷了。第二天各报都刊登了下列声明：“如果马不归还于我，我只好采取我父亲在同样情况下曾采取的极端措施。”威胁起了作用。贼虽不知道自己到底怕什么，但预料那措施一定非常可怕，他害了怕，偷偷把马送了回去。老爷对事情的结局十分高兴，他对朋友们坦言，他很幸运，因为不必遵循父亲的先例了。</p>
<p>“但是，您的父亲究竟做了什么呢？”大家问他。</p>
<p>“你们问，我父亲做了什么？好吧，我告诉你们……我父亲的马在大车店里被偷，他就背着马鞍子走回家去了。我起誓，我也会这么做，如果这个贼不是这么善良，这么乐于助人！”</p>
