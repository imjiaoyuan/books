<h1>许三观卖血记</h1>
<h2>余华</h2>
<b>简介</b>
<p>《许三观卖血记》以博大的温情描绘了磨难中的人生，以激烈的故事形式表达了人在面对厄运时求生的欲望。小说讲述了许三观靠着卖血度过了人生的一个个难关，战胜了命运强加给他的惊涛恶浪，而当他老了，知道自己的血再也没有人要时，精神却崩溃了。法国《读书》杂志在评论《许三观卖血记》时说道：这是一部精妙绝伦的小说，是朴实简洁和内涵意蕴深远的完美结合。</p>
