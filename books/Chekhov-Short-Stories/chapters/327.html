    <h2 id="cha317_317_1">医生的建议</h2>
<p>用“鸡毛蒜皮”泡水，每礼拜六空腹喝，能治<b>伤风</b>。</p>
<p>用下述办法治<b>头晕</b>有奇效：找两根线绳，把右耳拴在一面墙上，而把左耳拴在对面墙上，这样你的脑袋就不会<b>打转</b>了<a href="part0325.html#jz_333_333c" id="jzyy_333_333c"><sup>(333)</sup></a>。</p>
<p>尽可能让<b>服毒</b>自杀者呕吐，为达此目的，可让其闻一闻从猎人市场买回的食物。</p>
<p>患剧烈而顽固的<b>咳嗽</b>时，只要竭力坚持三四天不咳，你的病便会自然痊愈。</p>
