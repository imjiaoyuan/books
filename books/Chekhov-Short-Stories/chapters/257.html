    <h2 id="cha250_250_1">无害的思想</h2>
<p>您想不想在北极生长出海枣和菠萝？那就请把宗教事务所的秘书们和医务局的文牍们派到那儿去。没有人能比他们更让那片土地感到温暖。</p>
<p>自然界的一切都是合乎目的的。一个人临终时大自然把他变成撒沙器<a href="part0325.html#jz_73_73c" id="jzyy_73_73c"><sup>(73)</sup></a>，与此同时把此人一辈子制造的墨水滴洒下来。</p>
<p>远亲实际上也是亲人，要爱他们。</p>
<p>不是地方美化人，而是人美化地方。因此不是剧院美化站在剧院门口的警察，而是警察美化剧院。</p>
<p>淫荡的金丝雀胜过虔诚的大灰狼。</p>
<p>如果你的老婆爱哭，那你就用吸墨纸。虽不巧妙，然而实用。</p>
