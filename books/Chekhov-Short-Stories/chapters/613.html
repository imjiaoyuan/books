    <h1 id="pos2_2">后记</h1>
<p>时光流逝，二十余年过去了，真可谓“弹指一挥间”。近来，译文出版社的责任编辑刘晨，准确地把握住时机，全方位地为当前阅读经典文学作品的新高潮调动助推之力，把这套俄文全译本《契诃夫中短篇小说全集》纳入上海译文出版社总体规划之内，并拟尽快精装出版，以满足广大读者的阅读与收藏需要。作为这套丛书的组织者，本人对此十分赞赏，欣喜之情溢于言表。请允许我代表几近九旬之年的这些老译者老朋友向贵社全体同志致谢！</p>
<p><b>王守仁</b></p>
<p>2018年岁末于北京</p>
