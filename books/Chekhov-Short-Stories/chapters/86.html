    <h2 id="cha80_80_1">问题和答案</h2>
<p><b>问题：</b></p>
<p>1）如何才能知道<span>她</span>的心思？</p>
<p>2）不识字的人在何处会读？</p>
<p>3）妻子爱我吗？</p>
<p>4）在哪里可以站着坐？</p>
<p><b>答案：</b></p>
<p>1）对她进行搜查<a href="part0196.html#jz_1_60b" id="jzyy_1_60b"><sup>(60)</sup></a>。</p>
<p>2）在别人心里<a href="part0196.html#jz_1_61b" id="jzyy_1_61b"><sup>(61)</sup></a>。</p>
<p>3）谁的妻子？</p>
<p>4）区拘留所<a href="part0196.html#jz_1_62b" id="jzyy_1_62b"><sup>(62)</sup></a>。</p>
