    <p id="filepos10325075"><span><span>第二集第一魂环月底最后三天，求月票</span></span></p><p>到了月底，月票争夺也进入了白热化状态，对是有机会的。斗罗的最后一个月，不论胜负，小三都要努力的拼一下。小三说出的话一向算数，本月月票最后如果第一的话，十二月一日，凌晨就直接爆一万七，说话算数。</p><p>最后的关头了，小三只能依靠咱们唐门的兄弟姐妹们。大家为了斗罗最后的辉煌帮小三一把吧。小三能做的，就是尽可能的写好结尾回报大家。</p><p>(未完待续，如欲知后事如何，请登陆dian.m，章节更多，支持作，支持正版阅读！)</p><div id="calibre_pb_624"></div>
