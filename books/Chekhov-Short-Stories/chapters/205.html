    <h2 id="cha199_199_1">致采访记者的信</h2>
<p>尊敬的先生！一切我都知道！本星期发生大火灾六场，小火灾四场。一个年轻人开枪自杀，死于对一个姑娘的热恋，而该姑娘听到他的死讯，也精神失常。扫院子的古斯金由于喝多了结果上了吊。昨天沉了一条小船，上面有两位乘客和一个小孩……可怜的孩子！一个商人在“乐园饭店”背上给烧了个洞而且差点被扭断脖子。逮住四个衣冠楚楚的骗子，还有一列货车出了轨。这些消息我全知道，先生，有这么多形形色色的好新闻，您现在这么有钱，可是工钱您一分也不给我！……体面的先生们是不这么干的！</p>
<p>您的裁缝</p>
<p><b>兹米尔洛夫</b></p>
<p><b>无脾人报导</b></p>
