    <h2 id="cha145_145_1">新病和老处方</h2>
<p>挨鞭打<a href="part0196.html#jz_1_291b" id="jzyy_1_291b"><sup>(291)</sup></a>的症状与打摆子（<span>间歇性疟疾</span><a href="part0196.html#jz_1_292b" id="jzyy_1_292b"><sup>(292)</sup></a>）相似。挨鞭打之前病人由于末梢血管痉挛而脸色苍白，瞳孔扩张。一般应当指出，校长的模样刺激着血管舒缩中枢和<span>眼球运动神经</span><a href="part0196.html#jz_1_293b" id="jzyy_1_293b"><sup>(293)</sup></a>。病人感到打冷战。在病人挨鞭打时，我们发现其体温升高和皮肤感觉过敏。鞭打之后病人感到发烧。他浑身出汗。</p>
<p>基于上述相似之点，我建议中学生在去学校之前服奎宁。</p>
