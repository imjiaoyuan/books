    <p id="filepos10385876"><span><span>第二集第一魂环斗罗最后整月求月票</span></span></p><p>票之前，小三先澄清一下，现在有人冒名小书。那根本就不是小三的书，大家不要相信。小三新书开的话，一定会在斗罗这里通知大家的。外面那些书评区的都是冒名的。这种卑劣的做法小三无限鄙视。也会直接向**投诉。</p><p>十一月最后一天，也是斗罗最后一个整月。别的不说了，今天拿下月票第一，明天咱就一万七。让月票雨来的更猛烈些吧。</p><p>月票留着可就浪费了哦。小三拜谢了。(未完待续，如欲知后事如何，请登陆dian.m，章节更多，支持作，支持正版阅读！)</p><div id="calibre_pb_627"></div>
